services:
  # =============================================================================
  # 데이터베이스 서비스 (개발용 포트)
  # =============================================================================
  
  mysql:
    image: mysql:8.0
    container_name: mysql-container
    ports:
      - "3307:3306"
    networks:
      - app-network
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: dev_db
      MYSQL_USER: honey
      MYSQL_PASSWORD: 1234
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: --bind-address=0.0.0.0

  mongodb:
    image: mongo:latest
    container_name: mongodb-container
    ports:
      - "27018:27017"
    networks:
      - app-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: honey
      MONGO_INITDB_ROOT_PASSWORD: 1234
      MONGO_INITDB_DATABASE: dev_db
      MONGODB_AUTH_MECHANISM: SCRAM-SHA-256
    command: ["mongod", "--bind_ip", "0.0.0.0"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--username", "honey", "--password", "1234", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    container_name: redis-container
    ports:
      - "6531:6530"
    networks:
      - app-network
    environment:
      REDIS_DISABLE_COMMANDS: "FLUSHDB FLUSHALL"
    command: ["redis-server", "--port", "6530", "--requirepass", "1234", "--bind", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6530", "-a", "1234", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # =============================================================================
  # 애플리케이션 서비스 (개발환경 - 2개 collaborative room)
  # =============================================================================

  # API 서버
  api:
    container_name: api
    build:
      context: .
      dockerfile: packages/api/Dockerfile
      target: production
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - MYSQL_HOST=mysql-container
      - MYSQL_PORT=3306
      - MYSQL_USER=honey
      - MYSQL_PASSWORD=1234
      - MYSQL_DATABASE=dev_db
      - MONGO_HOST=mongodb-container
      - MONGO_USER=honey
      - MONGO_PASSWORD=1234
      - MONGO_DB=dev_db
      - LOG_LEVEL=debug
    networks:
      - app-network
    restart: unless-stopped

  # Collaborative Room 1 (개발환경)
  collaborative-room1:
    container_name: collaborative-room1
    build:
      context: .
      dockerfile: packages/collaborative/Dockerfile
      target: production
    ports:
      - "9001:9001"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - MYSQL_HOST=mysql-container
      - MYSQL_PORT=3306
      - MYSQL_USER=honey
      - MYSQL_PASSWORD=1234
      - MYSQL_DATABASE=dev_db
      - MONGO_HOST=mongodb-container
      - MONGO_USER=honey
      - MONGO_PASSWORD=1234
      - MONGO_DB=dev_db
      - LOG_LEVEL=debug
      - REDIS_USERNAME=
      - REDIS_PASSWORD=1234
      - REDIS_HOST=redis-container
      - REDIS_PORT=6530
      - SERVER_ID=room1-server
      - WS_PORT=9001
    networks:
      - app-network
    restart: unless-stopped

  # Collaborative Room 2 (개발환경)
  collaborative-room2:
    container_name: collaborative-room2
    build:
      context: .
      dockerfile: packages/collaborative/Dockerfile
      target: production
    ports:
      - "9002:9001"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - MYSQL_HOST=mysql-container
      - MYSQL_PORT=3306
      - MYSQL_USER=honey
      - MYSQL_PASSWORD=1234
      - MYSQL_DATABASE=dev_db
      - MONGO_HOST=mongodb-container
      - MONGO_USER=honey
      - MONGO_PASSWORD=1234
      - MONGO_DB=dev_db
      - LOG_LEVEL=debug
      - REDIS_USERNAME=
      - REDIS_PASSWORD=1234
      - REDIS_HOST=redis-container
      - REDIS_PORT=6530
      - SERVER_ID=room2-server
      - WS_PORT=9001
    networks:
      - app-network
    restart: unless-stopped

  # 로드 밸런서
  load-balancer:
    container_name: lb-container
    build:
      context: .
      dockerfile: packages/loadbalancer/Dockerfile
      target: production
    ports:
      - "4242:4242"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - REDIS_USERNAME=
      - REDIS_PASSWORD=1234
      - REDIS_HOST=redis-container
      - REDIS_PORT=6530
    networks:
      - app-network
    restart: unless-stopped

  # Frontend (개발용 nginx 설정 사용)
  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      target: production
    ports:
      - "8080:80"
    depends_on:
      - api
      - collaborative-room1
      - collaborative-room2
      - load-balancer
    volumes:
      # 개발용 nginx 설정 파일 사용 (2개 room)
      - ./packages/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql_data:
  mongo_data:

networks:
  app-network:
    driver: bridge 