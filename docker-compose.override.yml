services:
  mysql:
    image: mysql:8.0
    container_name: mysql-container
    ports:
      - "3306:3306"
    networks:
      - app-network
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: dev_db
      MYSQL_USER: honey
      MYSQL_PASSWORD: 1234
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: --bind-address=0.0.0.0

  collaborative_room1:
    build:
      context: .
      dockerfile: ./packages/collaborative/Dockerfile
    container_name: collaborative-room1
    ports:
      - "3001:3001"
      - "9001:9001"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - MYSQL_HOST=mysql-container
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=dev_db
      - MYSQL_PASSWORD=1234
      - MYSQL_USER=honey
      - NODE_ENV=dev
      - MONGO_HOST=mongodb-container
      - MONGO_USER=honey
      - MONGO_PASSWORD=1234
      - MONGO_DB=dev_db
      - LOG_LEVEL=debug
      - REDIS_HOST=redis-container
      - REDIS_USERNAME=honey
      - REDIS_PORT=6530
      - REDIS_PASSWORD=1234
      - SERVER_ID=room1
      - WS_PORT=9001
    networks:
      - app-network

  collaborative_room2:
    build:
      context: .
      dockerfile: ./packages/collaborative/Dockerfile
    container_name: collaborative-room2
    ports:
      - "3002:3002"
      - "9002:9002"
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - MYSQL_HOST=mysql-container
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=dev_db
      - MYSQL_PASSWORD=1234
      - MYSQL_USER=honey
      - NODE_ENV=dev
      - MONGO_HOST=mongodb-container
      - MONGO_USER=honey
      - MONGO_PASSWORD=1234
      - MONGO_DB=dev_db
      - LOG_LEVEL=debug
      - REDIS_HOST=redis-container
      - REDIS_USERNAME=honey
      - REDIS_PORT=6530
      - REDIS_PASSWORD=1234
      - SERVER_ID=room2
      - WS_PORT=9002
    networks:
      - app-network
  api:
    build:
      context: .
      dockerfile: ./packages/api/Dockerfile
    container_name: api
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - MYSQL_HOST=mysql-container
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=dev_db
      - MYSQL_PASSWORD=1234
      - MYSQL_USER=honey
      - NODE_ENV=dev
      - MONGO_HOST=mongodb-container
      - MONGO_USER=honey
      - MONGO_PASSWORD=1234
      - MONGO_DB=dev_db
      - LOG_LEVEL=debug
    networks:
      - app-network
  api:
    build:
      context: .
      dockerfile: ./packages/api/Dockerfile
    container_name: api
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - MYSQL_HOST=mysql-container
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=dev_db
      - MYSQL_PASSWORD=1234
      - MYSQL_USER=honey
      - NODE_ENV=dev
      - MONGO_HOST=mongodb-container
      - MONGO_USER=honey
      - MONGO_PASSWORD=1234
      - MONGO_DB=dev_db
      - LOG_LEVEL=info
    networks:
      - app-network

  load-balancer:
    build:
      context: .
      dockerfile: ./packages/loadbalancer/Dockerfile
    container_name: lb-container
    ports:
      - "4242:4242"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - LOG_LEVEL=debug
      - REDIS_HOST=redis-container
      - REDIS_USERNAME=honey
      - REDIS_PORT=6530
      - REDIS_PASSWORD=1234

  frotend:
    build:
      context: .
      dockerfile: ./packages/frontend/Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      load-balancer:
        condition: service_started
      collaborative_room1:
        condition: service_started
      collaborative_room2:
        condition: service_started
      api:
        condition: service_started
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    container_name: mongodb-container
    ports:
      - "27017:27017"
    networks:
      - app-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: honey
      MONGO_INITDB_ROOT_PASSWORD: 1234
      MONGO_INITDB_DATABASE: dev_db
      MONGODB_AUTH_MECHANISM: SCRAM-SHA-256
    command: ["mongod", "--bind_ip", "0.0.0.0"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--username",
          "honey",
          "--password",
          "1234",
          "--eval",
          "db.runCommand({ ping: 1 })",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest
    container_name: redis-container
    ports:
      - "6530:6530"
    networks:
      - app-network
    environment:
      REDIS_DISABLE_COMMANDS: "FLUSHDB FLUSHALL"
    command:
      [
        "redis-server",
        "--port",
        "6530",
        "--requirepass",
        "1234",
        "--bind",
        "0.0.0.0",
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6530", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
volumes:
  mysql_data:
  mongo_data:

networks:
  app-network:
    driver: bridge
