services:
  # =============================================================================
  # 빌드 캐시 최적화된 서비스들
  # =============================================================================
  
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile.optimized
      target: production
      cache_from:
        - honeyflow-api:cache
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: honeyflow-api:latest
    
  collaborative-server:
    build:
      context: .
      dockerfile: packages/collaborative/Dockerfile.optimized
      target: production
      cache_from:
        - honeyflow-collaborative:cache
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: honeyflow-collaborative:latest

  load-balancer:
    build:
      context: .
      dockerfile: packages/loadbalancer/Dockerfile.optimized
      target: production
      cache_from:
        - honeyflow-loadbalancer:cache
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: honeyflow-loadbalancer:latest

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile.optimized
      target: production
      cache_from:
        - honeyflow-frontend:cache
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: honeyflow-frontend:latest

# =============================================================================
# 빌드 최적화 설정
# =============================================================================
x-build-args: &build-args
  BUILDKIT_INLINE_CACHE: 1
  DOCKER_BUILDKIT: 1 